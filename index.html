function MetricCard({ label, value, sub, color }) {
  return (
    <div style={{
      background: S.card, border: `1px solid ${S.border}`, borderRadius: 12, padding: "18px 20px",
      flex: "1 1 180px", minWidth: 160, position: "relative", overflow: "hidden",
    }}>
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: color || S.accent }} />
      <div style={{ fontSize: 12, color: S.textDim, textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 8, fontFamily: "'DM Sans',sans-serif" }}>{label}</div>
      <div style={{ fontSize: 26, fontWeight: 700, color: S.text, fontFamily: "'Space Grotesk',monospace" }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: S.textDim, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function CellModal({ data, onClose }) {
  if (!data) return null;
  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, zIndex: 9999, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center",
      backdropFilter: "blur(6px)",
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: S.card, border: `1px solid ${S.border}`, borderRadius: 16, padding: 28, minWidth: 340, maxWidth: 500,
        boxShadow: `0 0 60px ${S.accentGlow}`,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: S.accent }}>{data.title}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: S.textDim, fontSize: 22, cursor: "pointer" }}>✕</button>
        </div>
        <div style={{ color: S.text, fontSize: 14, lineHeight: 1.8 }}>
          {Object.entries(data.details).map(([k, v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", borderBottom: `1px solid ${S.border}`, padding: "6px 0" }}>
              <span style={{ color: S.textDim }}>{k}</span>
              <span style={{ fontWeight: 600, fontFamily: "'Space Grotesk',monospace" }}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ClickCell({ children, onClick, style }) {
  const [hov, setHov] = useState(false);
  return (
    <td
      onClick={onClick}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        padding: "10px 14px", borderBottom: `1px solid ${S.border}`, cursor: "pointer", transition: "all 0.15s",
        background: hov ? S.accentDim : "transparent", fontFamily: "'Space Grotesk',monospace", fontSize: 13, ...style,
      }}
    >
      {children}
    </td>
  );
}

function Dashboard() {
  const [role, setRole] = useState("Admin");
  const [selectedTL, setSelectedTL] = useState("Rahul");
  const [selectedEmp, setSelectedEmp] = useState("");
  const [month, setMonth] = useState("Jan");
  const [tab, setTab] = useState("overview");
  const [modal, setModal] = useState(null);

  // Role-based filtering
  const visibleTLs = useMemo(() => {
    if (role === "Admin") return TL_LIST;
    if (role === "TL") return [selectedTL];
    return [selectedTL];
  }, [role, selectedTL]);

  const visibleEmployees = useMemo(() => {
    const tl = role === "Employee" ? selectedTL : selectedTL;
    const emps = EMPLOYEES_DATA[tl]?.[month] || [];
    if (role === "Employee" && selectedEmp) return emps.filter((e) => e.name === selectedEmp);
    return emps;
  }, [role, selectedTL, selectedEmp, month]);

  const visibleProjects = useMemo(() => {
    if (role === "Employee") return [];
    const tl = selectedTL;
    return PROJECTS_DATA[tl]?.[month] || [];
  }, [role, selectedTL, month]);

  // Aggregate stats — Leads & QL from EMPLOYEES_DATA (all 3 TLs), Bookings/Revenue/Pipeline from PROJECTS_DATA
  const stats = useMemo(() => {
    let totalLeads = 0, totalQL = 0, totalBookings = 0, totalRevenue = 0, totalPipeline = 0, totalSpend = 0;
    const tls = role === "Admin" ? TL_LIST : [selectedTL];
    tls.forEach((tl) => {
      const emps = EMPLOYEES_DATA[tl]?.[month] || [];
      emps.forEach((e) => {
        totalLeads += e.leads || 0;
        totalQL += e.ql || 0;
      });
      const projs = PROJECTS_DATA[tl]?.[month] || [];
      projs.forEach((p) => {
        totalBookings += p.bookings || 0;
        totalRevenue += p.revenue || 0;
        totalPipeline += p.pipeline || 0;
        totalSpend += p.spend || 0;
      });
    });
    if (role === "Admin") {
      const mk = MARKETING_SPEND[month] || [];
      totalSpend = mk.reduce((a, b) => a + (b.spend || 0), 0);
    }
    return { totalLeads, totalQL, totalBookings, totalRevenue, totalPipeline, totalSpend };
  }, [role, selectedTL, month]);

  const allEmployeeNames = useMemo(() => {
    const names = new Set();
    Object.values(EMPLOYEES_DATA[selectedTL] || {}).forEach((arr) => arr.forEach((e) => names.add(e.name)));
    return [...names].sort();
  }, [selectedTL]);

  const openCellModal = (title, details) => setModal({ title, details });

  // ─── RENDER ──────────────────────────────────────────────────────────────
  const tabBtn = (id, label) => (
    <button
      key={id}
      onClick={() => setTab(id)}
      style={{
        padding: "10px 22px", borderRadius: 8, border: `1px solid ${tab === id ? S.accent : S.border}`,

      }}
    >
      {label}
    </button>
  );

  const selectStyle = {
    padding: "8px 14px", borderRadius: 8, border: `1px solid ${S.border}`, background: S.card, color: S.text,
    fontSize: 13, cursor: "pointer", outline: "none", fontFamily: "'DM Sans',sans-serif",
  };

  const thStyle = {
    padding: "12px 14px", borderBottom: `2px solid ${S.accent}`, textAlign: "left", fontSize: 11,
    textTransform: "uppercase", letterSpacing: 1.2, color: S.accent, fontWeight: 700, position: "sticky", top: 0,
    background: S.card, fontFamily: "'DM Sans',sans-serif",
  };

  return (
    <div style={{
      minHeight: "100vh", background: S.bg, color: S.text, fontFamily: "'DM Sans', sans-serif",
      padding: 0, margin: 0,
    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

      {/* ─── HEADER ─── */}

        background: `linear-gradient(135deg, ${S.card} 0%, #1a1218 100%)`,
        borderBottom: `1px solid ${S.border}`, padding: "16px 28px", display: "flex", alignItems: "center", gap: 16,
        position: "sticky", top: 0, zIndex: 100, backdropFilter: "blur(12px)",
      }}>
        <img src={LOGO_SVG} alt="Logo" style={{ height: 44, width: 44, objectFit: "contain", borderRadius: 8, background: "#fff", padding: 3 }} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 20, fontWeight: 700, color: S.text, letterSpacing: -0.5 }}>
            Pune Operations <span style={{ color: S.accent }}>Dashboard</span>

          <div style={{ fontSize: 11, color: S.textDim, letterSpacing: 1 }}>PERFORMANCE TRACKER · JAN–MAR 2026</div>

                          {[
                            { label: "Leads", key: "leads", color: S.text },
                            { label: "QL", key: "ql", color: S.blue },
                            { label: "Bookings", key: "bookings", color: S.green },
                            { label: "Revenue", key: "revenue", color: S.green, cur: true },
                            { label: "Pipeline", key: "pipeline", color: "#a78bfa", cur: true },
                          ].map((row) => (
                            <tr key={row.label}>
                              <td style={{ padding: "6px 8px", fontSize: 11, color: S.textDim }}>{row.label}</td>
                              {MONTHS.map((m) => (
                                <ClickCell key={m} onClick={() => openCellModal(`${tl} - ${row.label} (${m})`, { Value: row.cur ? fmtCur(data[m][row.key]) : fmt(data[m][row.key]) })} style={{ color: row.color, textAlign: "right", fontSize: 12, padding: "6px 8px" }}>
                                  {row.cur ? fmtCur(data[m][row.key]) : fmt(data[m][row.key])}
                                </ClickCell>
                              ))}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ─── FOOTER ─── */}
        <div style={{ textAlign: "center", padding: "32px 0 16px", color: S.textDim, fontSize: 11 }}>
          Pune Operations Dashboard · Data sourced from Jan–Mar 2026 · {role} View
        </div>
      </div>

      {/* ─── MODAL ─── */}
      <CellModal data={modal} onClose={() => setModal(null)} />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
